<body>
<main>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark" aria-label="main navbar">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href = "index.html"><img class="rounded" style="width: 60px; height: 60px;" src="/siteIcons/keepGrowingIcon.svg"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            </div>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">Home</a><!--change to search bar-->
                    </li> 
                    <li class="nav-item">
                        <a href="new_item.html" class="nav-link">New listing</a>
                    </li>
                    <li class="nav-item">
                        <a href="my_items.html" class="nav-link">My items</a>
                    </li>
                </ul>
                <a class = "btn me-2" href = "login.html" id = "login"><i class="fa-solid fa-arrow-right-to-bracket" style="font-size:40px;color:white"></i></a>
                <button class = "btn me-2" id="usericon" type = "button" onclick="logout()"><i class="fas fa-user" style="font-size:40px;color:white"></i></button>
                <form class="d-flex" id = "searchForm">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" name="search" id = "searchInput">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            <div>
        </div>
    </nav>

    <h1 style="text-align: center; margin-top: 20px;">Search Results</h1>   

    <div class="container">
        <div class="row row-cols-4 justify-content-center" id = "items-container">
        </div>
    </div><!--/.container-->


</main>
    <script>
        async function loadItems(){
            let params = new URLSearchParams(window.location.search);
            let searchQuery = params.get('search') || '';
            const response = await fetch(`/api/items/${searchQuery}`);

            const container = document.getElementById("items-container")
            const items = await response.json();

            items.forEach(item => {
                const card = document.createElement('div');
                console.log(item.name);
                console.log(item.description);
                card.className = 'col-md-2 col-sm-12';
                card.innerHTML = `
                <img 
                    src="/images/${item.image}" 
                    alt="${item.name}"
                    width="140" 
                    height="140"
                    class="bd-placeholder-img rounded"
                    style="object-fit: cover;"
                    onerror="this.src='/images/placeholder.jpg'"
                />
                <h2 class = "item">${item.name}</h2>
                <p class = "item">${item.description}</p>
                <p><a class="btn btn-secondary" href="item.html?itemId=${item.item_id}">View Item &raquo;</a></p>`;
                container.appendChild(card)
            });
        }
        
    //-----------------------------|
    // Nav Bar functionality-------|
    //-----------------------------|
    async function updateNav() {
        const res = await fetch('/api/session');
        const data = await res.json();
        console.log(data.user);

        const loginButton = document.getElementById('login');
        const userIcon = document.getElementById('usericon')

        if (data.loggedIn) {
            loginButton.style.display = 'none';
            userIcon.style.display = 'block'
        } else {
            loginButton.style.display = 'block';
            userIcon.style.display = 'none'
        }
    }

    async function logout() {
        try {
            await fetch('/logout');
            window.location.href = '/';
        } catch (error) {
            console.error('error logging out: ', error);
        }
    }
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const searchQuery = formData.get('search');
        window.location.href = `search.html?search=${searchQuery}`;
    });
    document.addEventListener('DOMContentLoaded', updateNav);
    document.addEventListener('DOMContentLoaded', loadItems);
    </script>
</body>


</html>
