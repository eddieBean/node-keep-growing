<!DOCTYPE HTML>
<html>
<head>
    <title>Keep Growing</title>
    <link rel="icon" type="image/png" href="/siteIcons/favicon-96x96.png" sizes="96x96" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="/siteIcons/favicon.svg" />
    <link rel="shortcut icon" href="/siteIcons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/siteIcons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Keep Growing" />
    <link rel="manifest" href="/siteIcons/site.webmanifest" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/ea958534a3.js" crossorigin="anonymous"></script>
    <style>
        .item {max-width: 140px; min-width: 0;}
    </style>
    
</head>
<body>
<main>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark" aria-label="main navbar">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href = "index.html"><img class="rounded" style="width: 60px; height: 60px;" src="/siteIcons/keepGrowingIcon.svg"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            </div>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Home</a>
                    </li> 
                    <li class="nav-item">
                        <a href="new_item.html" class="nav-link active">New listing</a>
                    </li>
                    <li class="nav-item">
                        <a href="my_items.html" class="nav-link">My items</a>
                    </li>
                </ul>
                <a class = "btn me-2" href = "login.html" id = "login">Log in/Sign up</a>
                <button class = "btn me-2" id="usericon" type = "button" onclick="logout()">Log out</button>
                <form class="d-flex" id = "searchForm">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" name="search" id = "searchInput">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            <div>
        </div>
    </nav>

    <h1 style="text-align: center; margin-top: 20px;">Search Results</h1>   
    <div class ="container">
        <div class="row">
            <div class="col-4">
                <!-- Price Filter -->
                <h5 class="mb-3">Price</h5>
                <form class="d-flex" id="priceFilters">
                    <input class="form-control me-2" type="number" placeholder="minPrice" aria-label="minPrice price" name="minPrice">
                    <input class="form-control me-2" type="number" placeholder="maxPrice" aria-label="maxPrice price" name="maxPrice">
                    <button class="btn btn-outline-success" type="submit">Go</button>
                </form>

                <!-- Size Filter -->
                <h5 class="mb-3">Size</h5>
                <div class="list-group mb-4">
                    <button class="list-group-item list-group-item-action size-filter active">Any</button>
                    <button class="list-group-item list-group-item-action size-filter">Small</button>
                    <button class="list-group-item list-group-item-action size-filter">Medium</button>
                    <button class="list-group-item list-group-item-action size-filter">Large</button>
                    <button class="list-group-item list-group-item-action size-filter">Extra Large</button>
                </div>

                <!-- Condition Filter -->
                <h5 class="mb-3">Condition</h5>
                <div class="list-group">
                    <button class="list-group-item list-group-item-action condition-filter active">Any</button>
                    <button class="list-group-item list-group-item-action condition-filter">Brand-new</button>
                    <button class="list-group-item list-group-item-action condition-filter">Excellent</button>
                    <button class="list-group-item list-group-item-action condition-filter">Good</button>
                    <button class="list-group-item list-group-item-action condition-filter">Okay</button>
                    <button class="list-group-item list-group-item-action condition-filter">Well Worn</button>

                </div>
            </div>
            <div class="col-8">
                <div class = "container">
                    <div class="row row-cols-4 justify-content-center" id = "items-container">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto bg-light" style="height:70px;">
        <div class="container d-flex flex-wrap justify-content-between align-items-center align-items-middle py-3 my-4">
            <a href="index.html"
                class="d-flex align-items-center col-md-3 mb-2 mb-md-0 text-dark text-decoration-none lh-1">
                <img class="rounded" style="width: 40px; height: 40px;" src="/siteIcons/keepGrowingIcon.svg">
            </a>
            <span class="col-md-3 mb-0 text-muted">© 2026 Keep Growing</span>
        </div>
    </footer>


</main>
    <script>
        document.getElementById('priceFilters').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            let maxPrice = formData.get('maxPrice');
            let minPrice = formData.get('minPrice');
            sessionStorage.setItem('maxPrice', maxPrice);
            sessionStorage.setItem('minPrice', minPrice);
            const items = await getItems();
            loadItems(items);
        });
        
        async function sizeFilterListeners(){
            const sizeButtons = document.querySelectorAll('.size-filter');
            sizeButtons.forEach(button => {
                let size = button.textContent.trim()!== "Any" ? button.textContent.trim() : '';
                button.addEventListener('click', async () => {
                    sessionStorage.setItem('size', size);
                    document.querySelectorAll('.size-filter').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    const items = await getItems();
                    loadItems(items);
                });
            });
        };
        async function conditionFilterListeners(){
            const conditionButtons = document.querySelectorAll('.condition-filter');
            conditionButtons.forEach(button => {
                let condition = button.textContent.trim() !== "Any" ? button.textContent.trim() : '';
                button.addEventListener('click', async () => {
                    sessionStorage.setItem('condition', condition);
                    document.querySelectorAll('.condition-filter').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    const items = await getItems();
                    loadItems(items);
                });
            });
        };

        async function getItems() {
            let params = new URLSearchParams(window.location.search);
            let searchQuery = params.get('search') || '';
            let searchCategories = new map ([
                ['priceMax', 'Infinity'],
                ['priceMin', 0],
                ['size', ''],
                ['condition', '']
            ]);
            searchCategories.forEach((defaultValue, key) => {
                if (sessionStorage.getItem(key)) {
                    searchCategories.set(key, sessionStorage.getItem(key));
                } else {
                    searchCategories.set(key, defaultValue);
                }
            });
            const response = await fetch(`
                /api/search?search=${searchQuery}
                &priceMax=${searchCategories.get("priceMax")}
                &priceMin=${searchCategories.get("priceMin")}
                &size=${searchCategories.get("size")}
                &condition=${searchCategories.get("condition")}`
            );
            const items = await response.json();
            return items;
        }


        async function loadItems(items) {
            const container = document.getElementById("items-container");
            container.innerHTML = ''; // Clear existing items
            items.forEach(item => {
                const card = document.createElement('div');
                console.log(item.name);
                console.log(item.description);
                card.className = 'col-md-2 col-sm-12';
                card.innerHTML = `
                <img 
                    src="/images/${item.image}" 
                    alt="${item.name}"
                    width="140" 
                    height="140"
                    class="bd-placeholder-img rounded"
                    style="object-fit: cover;"
                    onerror="this.src='/images/placeholder.jpg'"
                />
                <h2 class = "item">${item.name}</h2>
                <p class = "item">${item.description}</p>
                <p><a class="btn btn-secondary" href="item.html?itemId=${item.item_id}">View Item &raquo;</a></p>`;
                container.appendChild(card);
            });
        }
        
    //-----------------------------|
    // Nav Bar functionality-------|
    //-----------------------------|
    async function updateNav() {
        const res = await fetch('/api/session');
        const data = await res.json();
        console.log(data.user);

        const loginButton = document.getElementById('login');
        const userIcon = document.getElementById('usericon')

        if (data.loggedIn) {
            loginButton.style.display = 'none';
            userIcon.style.display = 'block'
        } else {
            loginButton.style.display = 'block';
            userIcon.style.display = 'none'
        }
    }

    async function logout() {
        try {
            await fetch('/logout');
            window.location.href = '/';
        } catch (error) {
            console.error('error logging out: ', error);
        }
    }
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const searchQuery = formData.get('search');
        window.location.href = `search.html?search=${searchQuery}`;
    });
    document.addEventListener('DOMContentLoaded', async () => {
        updateNav();
        sizeFilterListeners();
        conditionFilterListeners();
        sessionStorage.setItem('maxPrice', 'Infinity');
        sessionStorage.setItem('minPrice', 0);
        sessionStorage.setItem('size', '');
        sessionStorage.setItem('condition', '');
        const items = await getItems();
        loadItems(items);
    });


    </script>
</body>


</html>
