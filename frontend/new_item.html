    <div class = 'new-item-form mx-auto' style="max-width: 80%;">
        <h1 class="mt-3">Create a new item listing</h1>
        <form id="new-item">
            <div class="form-group mb-3">
                <label for="itemName" class="form-label">Item name</label>
                <input
                    type="text"
                    name="itemName"
                    id="name"
                    class="form-control"
                    placeholder="Enter a name for your listing"
                    aria-describedby="item name entry"
                />
            </div>
            <div class="form-group mb-3">
                <label for="" class="form-label">Description</label>
                <textarea
                    type="text"
                    name="description"
                    id="description"
                    class="form-control"
                    placeholder="Enter a desctription of your item"
                    aria-describedby="helpId"
                    rows="3"
                ></textarea>
                <small id="helpId" class="text-body-secondary">Help text</small>
            </div>
            <div class="form-group mb-3">
                <label for="price">price</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text" id="inputGroupPrepend">$</span>
                    </div>
                    <input type="text" class="form-control" id="price" placeholder="" aria-describedby="inputGroupPrepend" required>
                    <div class="invalid-feedback">
                    Please choose a username.
                    </div>
                </div>
            </div>
            <div class="form-group mb-3">
                <label for="condition">Condition</label>

                <select class="form-control" id="condition">
                    <option selected>Select your item's current condition</option>
                    <option value="1">Well worn</option>
                    <option value="2">Much loved</option>
                    <option value="3">Okay</option>
                    <option value="4">Good</option>
                    <option value="5">Excellent</option>
                    <option value="6">Brand-new</option>
                </select>
            </div>
            <div class="form-group mb-3">
                <label for="size">Size</label>
                <input
                    type="text"
                    name="size"
                    id="size"
                    class="form-control"
                    placeholder=""
                    aria-describedby="item name entry"
                />
                <small id="helpId" class="text-body-secondary" style="color: rgb(187, 8, 8);">Not required</small>
            </div>
            <div class="form-group mb-3">
                <label for="ISBN">ISBN</label>
                <input
                    type="text"
                    name="ISBN"
                    id="ISBN"
                    class="form-control"
                    placeholder="XXX-XXXXXXXXXX"
                    aria-describedby="ISBN entry"              
                />
                <small id="helpId" class="text=text-body-secondary">ISBN for textbooks</small>
            </div>
            
        </form>
    </div>
