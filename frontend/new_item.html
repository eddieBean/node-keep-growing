<!DOCTYPE HTML>
<html>
<head>
    <title>Keep Growing</title>
    <link rel="icon" type="image/png" href="/siteIcons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/siteIcons/favicon.svg" />
    <link rel="shortcut icon" href="/siteIcons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/siteIcons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Keep Growing" />
    <link rel="manifest" href="/siteIcons/site.webmanifest" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/ea958534a3.js" crossorigin="anonymous"></script>
    <style>
        .item {max-width: 140px; min-width: 0;}
    </style>
    
</head>
<body>
<main>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark" aria-label="main navbar">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href = "index.html"><img class="rounded" style="width: 30px; height: 30px;" href="/siteIcons/web-app-manifest-512x512.png"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            </div>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link active">Home</a><!--change to search bar-->
                    </li> 
                    <li class="nav-item">
                        <a href="new_item.html" class="nav-link">New listing</a>
                    </li>
                </ul>
                <a class = "btn me-2" href = "login.html" id = "login"><i class="fa-solid fa-arrow-right-to-bracket" style="font-size:40px;color:white"></i></a>
                <button class = "btn me-2" id="usericon" type = "button" onclick="logout()"><i class="fas fa-user" style="font-size:40px;color:white"></i></button>
                <form class="d-flex" id = "searchForm">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" name="search" id = "searchInput">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            <div>
        </div>
    </nav>

    <div class = 'new-item-form mx-auto mb-5 needs-validation' style="max-width: 80%;">
        <h1 class="mt-3">Create a new item listing</h1>
        <form id="new-item">
            <div class="form-group mb-3">
                <label for="itemName" class="form-label">*Item name</label>
                <input
                    type="text"
                    name="name"
                    id="name"
                    class="form-control"
                    placeholder="Enter a name for your listing"
                    aria-describedby="item name entry"
                    autocapitalize="words"
                    required
                />
            </div>
            <div class="form-group mb-3">
                <label for="" class="form-label">*Description</label>
                <textarea
                    type="text"
                    name="description"
                    id="description"
                    class="form-control"
                    placeholder="Enter a desctription of your item"
                    aria-describedby="helpId"
                    rows="3"
                    required
                ></textarea>
                <small id="helpId" class="text-body-secondary">Help text</small>
            </div>
            <div class="form-group mb-3">
                <label for="price">*Price</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text" id="inputGroupPrepend">$</span>
                    </div>
                    <input type="text" class="form-control" name = "price" id="price" placeholder="" aria-describedby="inputGroupPrepend" required>
                    <div class="invalid-feedback">
                    Please choose a username.
                    </div>
                </div>
            </div>
            <div class="form-group mb-3">
                <label for="condition">*Condition</label>

                <select class="form-control" id="condition" name="condition" required>
                    <option selected>Select your item's current condition</option>
                    <option value="Brand-new">Brand-new</option>
                    <option value="Excellent">Excellent</option>
                    <option value="Good">Good</option>
                    <option value="Okay4">Okay</option>
                    <option value="Much loved">Much loved</option>
                    <option value="Well worn">Well worn</option>
                </select>
            </div>
            <div class="form-group mb-3">
                <label for="size">Size</label>
                <input
                    type="text"
                    name="size"
                    id="size"
                    class="form-control"
                    placeholder=""
                    aria-describedby="item name entry"
                    
                />
                <!-- <small id="helpId" class="text-body-secondary" style="color: rgb(187, 8, 8);">Not required</small> -->
            </div>
            <div class="form-group mb-3">
                <label for="ISBN">ISBN for books</label>
                <input
                    type="text"
                    name="ISBN"
                    id="ISBN"
                    class="form-control"
                    placeholder="XXXXXXXXXXXXX"
                    aria-describedby="ISBN entry"
                                  
                />
                <small id="helpId" class="text=text-body-secondary">ISBN-13</small>
            </div>
            <div class="form-group mb-3">
                <label for="image">*Image File</label>
                <input
                    type="file"
                    name="image"
                    id="image"
                    class="form-control"
                    placeholder=""
                    aria-describedby="image entry"
                    accept="image/*"
                    required              
                />
                <small id="helpId" class="text=text-body-secondary">Please provide an image of your item</small>
            </div>

            <button class = "btn btn-outline-primary" type="submit">Post</button>
        </form>
    </div>
    
</main>
<script>
    async function checkLogin() {
        const response = await fetch('/api/session');
        const data = await response.json();
        if (!data.userId) {
            alert('You must be logged in to post an item.');
            window.location.href = 'login.html';
        }
    }

    (function(){
        'use strict'
        const form = document.getElementById('new-item');
        
        if(form){
            form.addEventListener('submit', async (event) => {
                if(!form.checkValidity()){
                    event.preventDefault();
                    event.stopPropagation();
                }
                else{
                    event.preventDefault();
                    const formData = new FormData(form);
                    // const imageFile = formData.get('image');
                    // const formDataImage = new FormData();
                    // formDataImage.append('image', imageFile);
                    // const imageResponse = await fetch('/api/items/upload/image', {
                    //     method: 'POST',
                    //     body: formDataImage
                    // });
                    
                    // if (imageResponse.ok){
                        // const imageResult = await imageResponse.json();
                        // formData.delete('image');
                        // formData.append('image_url', imageResult.imageUrl);
                    
                    const sessionResponse = await fetch('/api/session');
                    const sessionData = await sessionResponse.json();
                    formData.append('owner_id', sessionData.userId);
                    // const data = Object.fromEntries(formData.entries());
                    const response = await fetch('/api/items/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    if(response.ok && result.success === true){
                        alert('Item posted successfully!');
                        window.location.href = 'index.html';
                    }
                    else{
                        alert('Failed to list item. Please try again. Error: ' + result.message);
                    }

                // }else{
                //     const imageResult = await imageResponse.json();
                //     alert('Image upload failed. Please try again. Error: ' + imageResult.message);
                // }
            }
            form.classList.add('was-validated');
            });
        }
    })();
    document.addEventListener('DOMContentLoaded', checkLogin);
</script>
</body>
</html>
