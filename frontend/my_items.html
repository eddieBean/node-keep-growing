                <form class="d-flex" id = "searchForm">

    <div class="p-5 m-3 rounded-3">
        <div class="container-lg py-5">
            <h1 class="display-5 fw-bold ">Your Item Listings</h1>
            <!-- <p class="col-md-8 fs-4">The online marketplace for your outgrown school uniforms and dusty textbooks!</p>
            <a class="btn btn-primary btn-lg" type="button" href="sign-up.html">Create your account now! &raquo;</a> -->
        </div>
    </div>
    

    <div class="container">
        <div class="row row-cols-4 justify-content-center" id = "items-container">
        </div>
    </div><!--/.container-->
</main>
    <footer class="footer bg-light d-flex align-items-middle" style="height:70px;">
        <div class="container d-flex flex-wrap justify-content-between align-items-center align-items-middle">
            <a href="index.html"
                class="d-flex align-items-center col-md-3 mb-2 mb-md-0 text-dark text-decoration-none lh-1">
                <img class="rounded" style="width: 40px; height: 40px;" src="/siteIcons/keepGrowingIcon.svg">
            </a>
            <span class="col-md-3 mb-0 text-muted">© 2026 Keep Growing</span>
        </div>
    </footer>
    <script>
        async function loadItems(){
            const container = document.getElementById("items-container")
            
            const response = await fetch('/api/user-items/');
            const items = await response.json();
            let saleText = "";
            items.forEach(item => {
                if (item.sold === 1){
                    saleText = " (SOLD)";
                } else {
                    saleText = "LISTED";
                }
                const card = document.createElement('div');
                console.log(item.name);
                console.log(item.description);
                card.className = 'col-md-3 col-6';
                card.innerHTML = `
                <img 
                    src="/images/${item.image}" 
                    alt="${item.name}"
                    width="140" 
                    height="140"
                    class="rounded"
                    style="object-fit: cover;"
                    onerror="this.src='/images/placeholder.jpg'"
                />
                <h2 class = "item">${item.name}</h2>
                <h4 class = "item">$${Number.parseFloat(item.price).toFixed(2)}</h4>
                <p><strong>${saleText}</strong></p>
                <p><a class="btn btn-secondary" href="item.html?itemId=${item.item_id}">View Item &raquo;</a></p>`;
                container.appendChild(card)
            });
        }
        
        async function updateNav() {
            const res = await fetch('/api/session');
            const data = await res.json();
            console.log(data.user);

            const loginButton = document.getElementById('login');
            const userIcon = document.getElementById('usericon')

            if (data.loggedIn) {
                loginButton.style.display = 'none';
                userIcon.style.display = 'block'
            } else {
                loginButton.style.display = 'block';
                userIcon.style.display = 'none'
            }
        }

        async function logout() {
            try {
                await fetch('/logout');
                window.location.href = '/';
            } catch (error) {
                console.error('error logging out: ', error);
            }
        }
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const searchQuery = formData.get('search');
            window.location.href = `search.html?search=${searchQuery}`;
        });
        
        async function checkLogin() {
            const response = await fetch('/api/session');
            const data = await response.json();
            if (!data.loggedIn) {
                alert('You must be logged in to post an item.');
                window.location.href = 'login.html';
            }
        }
        document.addEventListener('DOMContentLoaded', updateNav);
        document.addEventListener('DOMContentLoaded', loadItems);
        document.addEventListener('DOMContentLoaded', checkLogin);
    </script>
</body>


</html>
