<!DOCTYPE HTML>
<html>
<head>
    <title>Keep Growing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/ea958534a3.js" crossorigin="anonymous"></script>
    <style>
        .item {max-width: 140px; min-width: 0;}
    </style>
    
</head>
<body>
<main>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark" aria-label="main navbar">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href = "#">Keep Growing</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            </div>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">Home</a><!--change to search bar-->
                    </li> 
                    <li class="nav-item">
                        <a href="#" class="nav-link">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">Contact Us</a>
                    </li>
                </ul>
                <form class="d-flex">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            <div>
        </div>
    </nav>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark" aria-label="searchFilters">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="searchFilters">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">All</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                </ul>
                <a class = "btn" href = "login.html" id = "login"><i class="fa-solid fa-arrow-right-to-bracket" style="font-size:40px;color:white"></i></a>
                <a class = "btn" href = "sign-up.html" id = "signup"><i class="fa-solid fa-arrow-right-to-bracket" style="font-size:40px;color:brown"></i></a>
                <a class = "btn" id="usericon"><i class="fas fa-user" style="font-size:40px;color:white"></i></a>
            </div>
        </div>
    </nav>

    <div class="p-5 mb-4 bg-light rounded-3">
        <div class="container-lg py-5">
            <h1 class="display-5 fw-bold">Welcome to Keep Growing!</h1>
            <p class="col-md-8 fs-4">Description of keep growing and the items it sells etc.</p>
            <button class="btn btn-primary btn-lg" type="button">Featured Items</button>
        </div>
    </div>
    

    <div class="container">
        <div class="row row-cols-4 justify-content-center" id = "items-container">
        </div>
    </div><!--/.container-->


</main>
    <script>
        async function loadItems(){
            const container = document.getElementById("items-container")
            
            const response = await fetch('http://localhost:3000/api/items/');
            const items = await response.json();

            items.forEach(item => {
                const card = document.createElement('div');
                console.log(item.name);
                console.log(item.description);
                card.className = 'col-md-2 col-sm-12';
                card.innerHTML = `
                <img 
                    src="/images/${item.image}" 
                    alt="${item.name}"
                    width="140" 
                    height="140"
                    class="bd-placeholder-img rounded"
                    style="object-fit: cover;"
                    onerror="this.src='/images/placeholder.jpg'"
                />
                <p class = "item">${item.description}</p>
                <p><a class="btn btn-secondary" href="item.html?item=${item.item_id}">View Item &raquo;</a></p>
                `;
                container.appendChild(card)
            });
        }
        
        async function updateNav() {
            const res = await fetch('/api/session');
            const data = await res.json();
            console.log(data.user);

            const loginButton = document.getElementById('login');
            const signupButton = document.getElementById('signup');
            const userIcon = document.getElementById('usericon')

            if (data.loggedIn) {
                loginButton.style.display = 'none';
                signupButton.style.display = 'none';
                userIcon.style.display = 'block'
            } else {
                loginButton.style.display = 'block';
                signupButton.style.display = 'block';
                userIcon.style.display = 'none'
            }
        }
        document.addEventListener('DOMContentLoaded', updateNav);
        document.addEventListener('DOMContentLoaded', loadItems);
    </script>
</body>


</html>
