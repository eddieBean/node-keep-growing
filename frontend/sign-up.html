<!DOCTYPE html>
<head>
    <title>Sign Up - Keep Growing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/siteIcons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/siteIcons/favicon.svg" />
    <link rel="shortcut icon" href="/siteIcons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/siteIcons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Keep Growing" />
    <link rel="manifest" href="/siteIcons/site.webmanifest" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="loginStyle.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ea958534a3.js" crossorigin="anonymous"></script>

</head>
<body>
<main class="sign-in-form">
    <form id="signUpForm">
        <h1 style = "margin-bottom: 20px; margin-top: 0;">Register</h1>
        <div class="form-floating" style = "border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom:15px">
            <input
                type="text"
                class="form-control"
                id="user_name"
                name="user_name"
                placeholder="johndoe123"
                required
            />
            <label for="floatingInput" class="form-label">Username</label>
        </div>
        <div class="form-floating" style = "border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom:15px">
            <input
                type="text"
                class="form-control"
                id="school"
                name="school"
                placeholder="My School"
                required
            />
            <label for="school" class="form-label">Schools</label>
        </div>
        <div class="form-floating" style = "border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom:15px">
            <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                aria-describedby="emailHelpId"
                placeholder="abc@mail.com"
                required
            />
            <label for="floatingInput" class="form-label">Email</label>
        </div>        
        <div class="form-floating" style = "border-top-left-radius: 0; border-top-right-radius: 0;margin-bottom:10px">
            <input
                type="password"
                class="form-control"
                name="password"
                id="password"
                placeholder=""
                required
                min-length = 8
            />
            <label for="floatingPassword" class="form-label">Password</label>
        </div>
        <div class="form-floating" style="border-top-left-radius: 0; border-top-right-radius: 0;margin-bottom:10px">
            <label for="phone" class="form-label">Phone Number</label>
            <div class="input-group input-group-lg">
                <div class="input-group-prepend">
                    <span class="input-group-text" id="inputGroupPrepend" style="height:58px">+61</span>
                </div>
                <input style="height:58px" type="text" class="form-control" name="phone" id="phone" placeholder="412 345 678" />
            </div>
        </div>

        <button class = "btn btn-outline-primary" type="submit">Create Account</button>
    </form>
        <div class="alert alert-danger d-flex align-items-center" role="alert" id="errorAlert" style="display: none !important; margin-top: 20px;">
        <i class="fa-solid fa-triangle-exclamation bi flex-shrink-0 me-2" style="width: 24px; height: 24px;"></i>
        <div id="errorMessage" style="margin-left: 10px;"></div>
    </div>
        <p style="margin-top: 20px;">Already registered? <a href="login.html">Log in here.</a></p>

</main>

<script>
    //create an event listner for the form submission
    document.getElementById('signUpForm').addEventListener('submit', async (event) => {
        //prevent the default form behaviour
        event.preventDefault();
        //get the form data and convert it to a JSON object
        const formData = new FormData(event.target);
        const data = Object.fromEntries(formData);
        
        try {
            //send the data to the server
            const response = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
                redirect: 'manual'
            });
            
            //server error handling
            if (response.ok) {
                // Success - redirect to home
                window.location.href = '/';
            } else {
                // Error - show alert with error message
                const errorData = await response.json();
                document.getElementById('errorMessage').textContent = errorData.message;
                document.getElementById('errorAlert').style.display = 'flex';
            }
        //frontend error handling
        } catch (err) {
            console.error('Login error:', err);
            document.getElementById('errorMessage').textContent = 'An error occurred. Please try again.';
            document.getElementById('errorAlert').style.display = 'flex';
        }
    });
</script>
</body>
</html>
